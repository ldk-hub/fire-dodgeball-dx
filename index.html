<h1>★ 불꽃의 피구왕 DX ★</h1>
<div id="wrap"><canvas id="cv" width="960" height="600"></canvas></div>

  <kbd>←→↑↓</kbd> 이동 (같은 방향 두 번 = <b>대시</b>) &nbsp; <kbd>Z</kbd> <b>던지기</b>(꾹=차지, 내야 풀차지=<b>필살슛, 8명 전원 다름!</b>) · 수비 시 <b>캐치</b> &nbsp;
  <kbd>X</kbd> <b>패스</b> &nbsp; <kbd>C</kbd>/<kbd>Space</kbd> <b>점프</b>(공중 Z=<b>점프슛</b>) &nbsp; <kbd>M</kbd> BGM &nbsp; <kbd>Enter</kbd> 시작/정지<br>

<script>
'use strict';
// 원작(패미컴 피구 게임) '메커니즘' 오마주 팬게임 — 아트/명칭 전부 오리지널.
const cv=document.getElementById('cv'),g=cv.getContext('2d');
g.imageSmoothingEnabled=false;
const W=960,H=600;
const CT={x:80,y:200,w:800,h:330,cx:480};

// ================= input =================
const keys={};let zPrev=false,xPrev=false;
const tapT={arrowleft:-99,arrowright:-99,arrowup:-99,arrowdown:-99};
let frame=0;
// e.code(물리 키 위치) 우선 매핑 — 한/영 입력기 상태와 무관하게 동작
const CODE={ArrowLeft:'arrowleft',ArrowRight:'arrowright',ArrowUp:'arrowup',ArrowDown:'arrowdown',
  KeyZ:'z',KeyX:'x',KeyC:'c',Space:' ',KeyM:'m',Enter:'enter',NumpadEnter:'enter'};
const keyOf=e=>CODE[e.code]||e.key.toLowerCase();
onkeydown=e=>{const k=keyOf(e);
  if(['arrowleft','arrowright','arrowup','arrowdown',' ','z','x','c'].includes(k))e.preventDefault();
  if(!keys[k]&&tapT[k]!==undefined){ // double-tap dash
    if(frame-tapT[k]<14)dashReq=k;
    tapT[k]=frame;
  }
  keys[k]=true;
  if(k==='enter')onEnter();
  if(k==='m')bgmOn=!bgmOn;
};
onkeyup=e=>{keys[keyOf(e)]=false;};
onblur=()=>{for(const k in keys)keys[k]=false;charging=false;}; // 포커스 이탈 시 키 고착 방지
let dashReq=null;

// ================= audio =================
let AC=null,bgmOn=true,bgmTimer=null,bgmStep=0;
function ac(){AC=AC||new (window.AudioContext||window.webkitAudioContext)();return AC;}
function sfx(f,dur,type='square',vol=.08,slide=0){
  try{const A=ac(),o=A.createOscillator(),v=A.createGain();
  o.type=type;o.frequency.value=f;
  if(slide)o.frequency.linearRampToValueAtTime(Math.max(30,f+slide),A.currentTime+dur);
  v.gain.value=vol;v.gain.exponentialRampToValueAtTime(.001,A.currentTime+dur);
  o.connect(v).connect(A.destination);o.start();o.stop(A.currentTime+dur);}catch(e){}
}
function jingle(ns,step=130){ns.forEach((n,i)=>setTimeout(()=>sfx(n,.16,'square',.09),i*step));}
// chiptune loop: melody + bass (16 steps)
const MEL=[392,0,494,523,587,0,523,494,392,0,494,523,659,587,523,494];
const BAS=[98,0,98,0,147,0,147,0,98,0,98,0,131,0,147,0];
function bgmTick(){
  if(!bgmOn||state==='title'){bgmStep=0;return;}
  const m=MEL[bgmStep%16],b=BAS[bgmStep%16];
  if(m)sfx(m,.11,'square',.028);
  if(b)sfx(b,.13,'triangle',.05);
  bgmStep++;
}
function startBgm(){if(!bgmTimer)bgmTimer=setInterval(bgmTick,135);}

// ================= utils =================
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);
const rnd=(a,b)=>a+Math.random()*(b-a);
function px(x,y,w,h,col){g.fillStyle=col;g.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h));}

// ================= PIXEL SPRITES =================
// 16-wide grids. letters: H hair, B band(cap:white), S skin, E eye, X hurt-eye,
// U uniform, D shorts, W white, R mouth. auto-outline + auto-shade at render.
const HEAD=[

const sprCache=new Map();
function sprite(pose,pal,name){
  const key=pose+'|'+pal.H+pal.B+pal.S+pal.U+pal.D+'|'+(name||'');
  if(sprCache.has(key))return sprCache.get(key);
  const rows=SPR[pose];
  const gw=Math.max(...rows.map(r=>r.length)),gh=rows.length;
  const c1=document.createElement('canvas');c1.width=gw+2;c1.height=gh+2;
  const x=c1.getContext('2d');
  const map={H:pal.H,B:pal.B,S:pal.S,E:'#181828',e:'#ffffff',X:'#c62828',U:pal.U,D:pal.D,W:'#f2f2f2',R:'#b23333',h:pal.H,u:pal.U,d:pal.D,p:'#f2a184'};
  const solid=(r,c)=>{const ch=rows[r]&&rows[r][c];return ch&&ch!=='.';};
  // outline pass
  x.fillStyle='#191220';
  for(let r=0;r<gh;r++)for(let c=0;c<gw;c++)if(solid(r,c)){
    x.fillRect(c,r+1,1,1);x.fillRect(c+2,r+1,1,1);x.fillRect(c+1,r,1,1);x.fillRect(c+1,r+2,1,1);}
  // color pass
  for(let r=0;r<gh;r++)for(let c=0;c<gw;c++){const ch=rows[r][c];
    if(ch&&ch!=='.'){x.fillStyle=map[ch]||'#f0f';x.fillRect(c+1,r+1,1,1);}}
  // deco pass: 캐릭터 고유 액세서리 (표준 포즈에만)
  const deco=name&&STD_POSES.includes(pose)?CHARDECO[name]:null;
  if(deco)deco.px.forEach(d=>{x.fillStyle=map[d[2]]||d[2];x.fillRect(d[0]+1,d[1]+1,1,1);});
  // 소문자 셀 = 같은 색의 어두운 변형 (옷 주름·음영)
  x.fillStyle='rgba(0,0,0,.27)';
  for(let r=0;r<gh;r++)for(let c=0;c<gw;c++){const ch=rows[r][c];
    if(ch==='h'||ch==='u'||ch==='d')x.fillRect(c+1,r+1,1,1);}
  // 림라이트: 상단 엣지 하이라이트
  x.fillStyle='rgba(255,255,255,.20)';
  for(let r=0;r<gh;r++)for(let c=0;c<gw;c++)if(solid(r,c)&&!solid(r-1,c))x.fillRect(c+1,r+1,1,1);
  // shade pass (right third darker)
  x.fillStyle='rgba(20,10,30,.22)';
  for(let r=0;r<gh;r++)for(let c=Math.floor(gw*.62);c<gw;c++)if(solid(r,c))x.fillRect(c+1,r+1,1,1);
  sprCache.set(key,c1);return c1;
}
function palOf(c){
  return {H:c.hair,B:c.captain?'#ffffff':c.hair,
    S:c.team===0?'#ffd9a8':'#f0c894',
    U:c.team===0?'#2f6fde':'#e04141',
    D:c.team===0?'#1c4aa0':'#8f1f1f'};
}

// CRT 오버레이 (스캔라인 + 비네트) — 1회 생성
const crt=document.createElement('canvas');crt.width=W;crt.height=H;
{const x=crt.getContext('2d');
 x.fillStyle='rgba(0,0,0,.10)';
 for(let y=0;y<H;y+=3)x.fillRect(0,y,W,1);
 const vg=x.createRadialGradient(W/2,H/2,H/2.2,W/2,H/2,H*1.05);
 vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(8,4,18,.4)');
 x.fillStyle=vg;x.fillRect(0,0,W,H);}

// ================= state =================
let P=[],ball,parts=[];
let state='title',introT=0,fightT=0,overDelay=0,winner=-1,paused=false;
let shake=0,freezeT=0,flashT=0,msg='',msgT=0,msgBig=false;
let cutT=0,cutChar=null; // fire-shot cut-in
let charge=0,charging=false,cpuLevel=1;

const ROSTER0=[{n:'불꽃',hair:'#ff7f27',cap:true},{n:'바람',hair:'#5b4632'},{n:'산',hair:'#2d2d2d'},{n:'들',hair:'#7a5230'}];
const ROSTER1=[{n:'강철',hair:'#cfd8dc',cap:true},{n:'독수리',hair:'#1a1a2e'},{n:'상어',hair:'#37474f'},{n:'번개',hair:'#4a148c'}];
// 캐릭터별 고유 필살슛 (궤적 물리가 전부 다름)
const SKILLS={
 '불꽃':{label:'불 꽃 슛',type:'blaze',col:'#ff5722',col2:'#ffeb3b'},
 '바람':{label:'회오리슛',type:'curve',col:'#26c6da',col2:'#b2ebf2'},
 '산':{label:'바 위 슛',type:'heavy',col:'#8d6e63',col2:'#d7ccc8'},

 '강철':{label:'강 철 슛',type:'blaze',col:'#b0bec5',col2:'#eceff1'},
 '독수리':{label:'급강하슛',type:'drop',col:'#7e57c2',col2:'#d1c4e9'},

 '번개':{label:'번 개 슛',type:'zigzag',col:'#ffee58',col2:'#fff9c4'}
};
const skillOf=c=>SKILLS[c.name]||null;
// 캐릭터 개성: 고유 액세서리 픽셀([gx,gy,색]) + 체격(scale)
const CHARDECO={
 '불꽃':{px:[[5,-1,'H'],[8,-1,'H'],[11,-1,'H'],[3,0,'H'],[12,0,'H']],scale:1},        // 삐죽 불머리
 '바람':{px:[[3,4,'#26c6da'],[4,4,'#26c6da'],[5,4,'#26c6da'],[6,4,'#26c6da'],[7,4,'#26c6da'],[8,4,'#26c6da'],[9,4,'#26c6da'],[10,4,'#26c6da'],[2,2,'H'],[13,2,'H']],scale:1}, // 고글 밴드
 '산':{px:[[4,4,'#3e2723'],[5,4,'#3e2723'],[6,4,'#3e2723'],[8,4,'#3e2723'],[9,4,'#3e2723'],[10,4,'#3e2723']],scale:1.18},           // 굵은 눈썹 + 거구
 '들':{px:[[4,6,'#c98b5e'],[11,6,'#c98b5e']],scale:.86},                              // 주근깨 + 단신

 '상어':{px:[[4,5,'#111'],[5,5,'#111'],[6,5,'#111'],[7,5,'#111'],[8,5,'#111'],[9,5,'#111'],[10,5,'#111'],[11,5,'#111']],scale:1.04}, // 선글라스
 '번개':{px:[[5,1,'#ffee58'],[6,2,'#ffee58'],[7,1,'#ffee58'],[8,2,'#ffee58'],[9,1,'#ffee58']],scale:1},     // 번개 브릿지
 '외야1':{px:[[4,0,'D'],[5,0,'D'],[6,0,'D'],[7,0,'D'],[8,0,'D'],[9,0,'D'],[10,0,'D'],[11,0,'D'],[12,2,'D'],[13,2,'D']],scale:1},   // 야구모자
 '외야2':{px:[[4,0,'D'],[5,0,'D'],[6,0,'D'],[7,0,'D'],[8,0,'D'],[9,0,'D'],[10,0,'D'],[11,0,'D'],[12,2,'D'],[13,2,'D']],scale:.94}
};
const STD_POSES=['idle','run0','run1','windup','throw0','catch0','hit','jump'];

function mkChar(team,role,i,info,hp){
  return {team,role,i,name:info?info.n:'외야'+(i+1),hair:info?info.hair:(team?'#333':'#6d4c41'),
    captain:!!(info&&info.cap),maxHp:hp,hp,x:0,y:0,z:0,vz:0,kx:0,
    anim:'idle',lock:0,koT:0,gone:false,moving:false,dashT:0,fireT:0,
    catchT:0,catchCd:0,aiT:rnd(.5,1.5),face:team===0?1:-1};
}
function aliveIn(t){return P.filter(p=>p.team===t&&p.role==='in'&&p.hp>0);}
function homePos(c){
  if(c.role==='in'){
    const inn=aliveIn(c.team);const idx=Math.max(0,inn.indexOf(c));const n=Math.max(1,inn.length);
    return {x:c.team===0?CT.x+160:CT.x+CT.w-160,y:CT.y+CT.h*(idx+1)/(n+1)};
  }
  return {x:c.team===0?CT.x+CT.w+40:CT.x-40,y:CT.y+CT.h*(c.i===0?0.3:0.7)};
}
function bounds(c){
  if(c.role==='in')return c.team===0
    ?{x0:CT.x+16,x1:CT.cx-20,y0:CT.y+40,y1:CT.y+CT.h-14}
    :{x0:CT.cx+20,x1:CT.x+CT.w-16,y0:CT.y+40,y1:CT.y+CT.h-14};
  return c.team===0
    ?{x0:CT.x+CT.w+24,x1:CT.x+CT.w+58,y0:CT.y+44,y1:CT.y+CT.h-20}
    :{x0:CT.x-58,x1:CT.x-24,y0:CT.y+44,y1:CT.y+CT.h-20};
}
function reset(){
  P=[];parts=[];
  for(let i=0;i<4;i++)P.push(mkChar(0,'in',i,ROSTER0[i],ROSTER0[i].cap?5:3));
  for(let i=0;i<2;i++)P.push(mkChar(0,'out',i,null,1));
  for(let i=0;i<4;i++)P.push(mkChar(1,'in',i,ROSTER1[i],ROSTER1[i].cap?4+cpuLevel:3));
  for(let i=0;i<2;i++)P.push(mkChar(1,'out',i,null,1));
  P.forEach(c=>{const h=homePos(c);c.x=h.x;c.y=h.y;});
  ball={x:0,y:0,z:34,vx:0,vy:0,vz:0,holder:P[0],flying:false,fire:false,skill:null,skT:0,dropPhase:0,tgt:null,dmg:1,fromTeam:0,passTo:null,hist:[],spin:0};
  charge=0;charging=false;shake=0;freezeT=0;flashT=0;msg='';msgT=0;overDelay=0;paused=false;cutT=0;
}
function onEnter(){
  if(state==='title'||state==='over'){reset();state='intro';introT=0;sfx(660,.15,'square',.1,220);startBgm();}
  else if(state==='play'){paused=!paused;sfx(paused?300:500,.08,'square',.07);}
}
function flash(t,big=false){msg=t;msgT=big?80:55;msgBig=big;}

// ================= anim =================
const LOCKED=['windup','throw','catch','hit','ko','launch','down'];
function setAnim(c,name,t=0){if(c.anim==='ko')return;c.anim=name;c.lock=t;}

// ================= particles =================
function burst(x,y,col,n,sp,grav=0.12){
  for(let i=0;i<n;i++){const a=rnd(0,7);const s=rnd(sp*.3,sp);
    parts.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s*.6,t:rnd(14,30),col,sz:rnd(2,5),grav});}
}
function flame(x,y,cols){const cs=cols||['#ff5722','#ff9800','#ffeb3b'];
  parts.push({x:x+rnd(-4,4),y:y+rnd(-4,4),vx:rnd(-.5,.5),vy:rnd(-1.6,-.4),t:rnd(10,20),col:cs[Math.floor(rnd(0,cs.length))],sz:rnd(2,5),grav:-.02});}

// ================= actions =================
function targetOf(c){
  const ts=aliveIn(1-c.team);if(!ts.length)return null;
  return ts.reduce((a,b)=>dist(a,c)<dist(b,c)?a:b);
}
function throwBall(c,useSkill){
  const t=targetOf(c);if(!t){looseBall();return;}
  const sk=useSkill?skillOf(c):null;
  const air=c.z>4;
  const base=sk?(sk.type==='heavy'?6.8:sk.type==='drop'?10:13):7.4+(c.team===1?cpuLevel*.5:0);
  let sp=base*(air?1.2:1);
  const d=Math.max(1,dist(t,c));
  ball.holder=null;ball.flying=true;ball.skill=sk;ball.fire=!!sk;ball.dmg=sk?2:1;
  ball.skT=0;ball.dropPhase=0;ball.tgt=t;
  ball.fromTeam=c.team;ball.passTo=null;ball.x=c.x+c.face*18;ball.y=c.y-4;ball.z=air?c.z+40:38;ball.vz=0;
  ball.vx=(t.x-c.x)/d*sp;ball.vy=(t.y-c.y)/d*sp;ball.hist=[];
  if(sk&&sk.type==='drop')ball.vz=9;
  if(c.team===0){if(keys['arrowup'])ball.vy-=1.9;if(keys['arrowdown'])ball.vy+=1.9;}
  setAnim(c,'throw',14);
  sfx(sk?190:330,sk?.3:.12,sk?'sawtooth':'square',.13,sk?420:-90);
  if(air)sfx(700,.1,'square',.06,150);
  if(sk){freezeT=64;flashT=10;shake=13;cutT=64;cutChar=c;
    burst(c.x,c.y-40,sk.col,26,4,-.02);jingle([880,988,1175],60);}
}
function passBall(c){
  const mates=P.filter(p=>p.team===c.team&&p!==c&&p.hp>0);
  if(!mates.length)return;
  const outs=mates.filter(m=>m.role==='out');
  const t=outs.length?outs[Math.floor(rnd(0,outs.length))]:mates[0];
  const d=Math.max(1,dist(t,c));const sp=9.5;
  ball.holder=null;ball.flying=true;ball.fire=false;ball.dmg=0;
  ball.fromTeam=c.team;ball.passTo=t;ball.x=c.x;ball.y=c.y-4;ball.z=38;ball.vz=1.4; // lob arc
  ball.vx=(t.x-c.x)/d*sp;ball.vy=(t.y-c.y)/d*sp;ball.hist=[];
  setAnim(c,'throw',12);sfx(540,.08,'square',.07);
}
function looseBall(){
  ball.flying=false;ball.holder=null;ball.passTo=null;
  ball.vx*=.3;ball.vy*=.3;ball.dmg=1;ball.fire=false;ball.skill=null;ball.skT=0;ball.dropPhase=0;ball.hist=[];
  if(ball.vz>-1)ball.vz=1.6; // pop up & bounce
}
function hitChar(c,guard){
  if(c.role==='out'){burst(ball.x,ball.y-20,'#ddd',8,2.5);looseBall();return;}
  const dmg=guard?1:ball.dmg;
  const p=guard?0.6:(ball.skill?(ball.skill.type==='heavy'?2.2:1.6):1); // 피격 강도
  const dir=ball.vx>0?1:-1;
  c.hp-=dmg;
  if(p>=1.4){ // 강타: 공중 런치
    c.anim='launch';c.lock=999;c.bounced=false;c.catchT=0;
    c.kvx=dir*(3.5+p*2.5);c.vz=3.5+p*1.8;c.z=Math.max(c.z,1);
    freezeT=Math.max(freezeT,ball.skill?12:6);flashT=Math.max(flashT,8);
  }else{
    setAnim(c,'hit',guard?14:22);c.kx=dir*4*(guard?.5:1);
  }
  shake=Math.max(shake,Math.round(4+p*5));
  burst(c.x,c.y-40,ball.skill?ball.skill.col:'#fff176',Math.round(10+p*10),2.2+p*1.4);
  sfx(130,.28,'sawtooth',.15,-70);
  if(guard)flash('가드!! 하지만 뜨겁다…!');
  if(c.hp<=0){flash(`${c.name} 아웃!!`,c.captain);
    sfx(85,.55,'sawtooth',.16,-40);burst(c.x,c.y-30,'#ffeb3b',14,3);
    if(p<1.4){c.anim='ko';c.koT=95;}}
  looseBall();
  if(aliveIn(0).length===0||aliveIn(1).length===0){
    winner=aliveIn(1).length===0?0:1;overDelay=90;
    if(winner===0){cpuLevel=Math.min(3,cpuLevel+1);jingle([523,659,784,1047]);}
    else jingle([392,330,262,196],170);
  }
}

// ================= control =================
function myActive(){
  if(ball.holder&&ball.holder.team===0)return ball.holder;
  const inn=aliveIn(0);if(!inn.length)return null;
  return inn.reduce((a,b)=>dist(a,ball)<dist(b,ball)?a:b);
}
function tryJump(c){if(!c.gone&&c.z===0&&c.anim!=='ko'){c.vz=6.8;setAnim(c,'jump');sfx(430,.08,'square',.05,130);burst(c.x,c.y+2,'#b7a289',5,1.8,.02);}}
// 상시 무빙: 배회 목표점 + 팀메이트 분산 (망부석 방지)
function wander(c,lvl,aggressive){
  c.mvT=(c.mvT||0)-1;
  const h=homePos(c);
  if(c.mvT<=0||c.wx===undefined){
    const spread=aggressive?95:60;
    const push=aggressive?(c.team===0?1:-1)*rnd(10,80):0;
    c.wx=h.x+rnd(-spread,spread)+push;
    c.wy=h.y+rnd(-75,75);
    c.mvT=rnd(26,70);
  }
  const d=Math.hypot(c.wx-c.x,c.wy-c.y);
  if(d>6){const sp=1.5+lvl*.3+(aggressive?.5:0);
    c.x+=(c.wx-c.x)/d*sp;c.y+=(c.wy-c.y)/d*sp;}
}
function separate(c){
  P.forEach(o=>{if(o===c||o.gone||o.hp<=0||o.team!==c.team||o.role!==c.role)return;
    const d=dist(c,o);if(d<44&&d>0){c.x+=(c.x-o.x)/d*1.1;c.y+=(c.y-o.y)/d*1.1;}});
}

// ================= update =================
function update(){
  frame++;
  if(shake>0)shake--;if(flashT>0)flashT--;if(msgT>0)msgT--;if(cutT>0)cutT--;
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.t--;});
  parts=parts.filter(p=>p.t>0);
  if(state==='intro'){introT++;if(introT===1)jingle([440,554,659],110);
    if(introT>150){state='play';fightT=100;}return;}
  if(state!=='play'||paused)return;
  if(fightT>0){fightT--;if(fightT===60)sfx(600,.12,'square',.1);
    if(fightT===40)sfx(880,.2,'square',.12,100);return;}
  if(freezeT>0){freezeT--;
    if(ball.fire&&ball.flying){const sc=ball.skill;flame(ball.x,ball.y-ball.z,sc?[sc.col,sc.col2]:null);}
    dashReq=null;return;}
  if(overDelay>0){overDelay--;
    P.filter(c=>c.team===winner&&c.hp>0).forEach(c=>{if(c.anim!=='cheer')c.anim='cheer';});
    if(overDelay===0)state='over';
  }

  const me=myActive();

  // ---- player input ----
  if(me&&(!LOCKED.includes(me.anim)||me.anim==='windup')){
    if(me.anim!=='windup'){
      if(dashReq&&me.dashT<=0){me.dashT=12;sfx(750,.07,'square',.06,200);
        burst(me.x,me.y,'#fff',6,2,.02);}
      const sp=me.dashT>0?6.2:3.5;if(me.dashT>0)me.dashT--;
      let mv=false;
      if(keys['arrowleft']){me.x-=sp;mv=true;}
      if(keys['arrowright']){me.x+=sp;mv=true;}
      if(keys['arrowup']){me.y-=sp;mv=true;}
      if(keys['arrowdown']){me.y+=sp;mv=true;}
      me.moving=mv;
      const b=bounds(me);me.x=clamp(me.x,b.x0,b.x1);me.y=clamp(me.y,b.y0,b.y1);
      if((keys['c']||keys[' '])&&me.z===0)tryJump(me);
    }
  }
  dashReq=null;
  const myHolder=(ball.holder&&ball.holder.team===0)?ball.holder:null;
  const zNow=!!keys['z'],xNow=!!keys['x'];
  if(zNow){
    if(myHolder){charging=true;
      const cap=myHolder.role==='in'?100:68;
      charge=Math.min(cap,charge+1.8);
      if(myHolder.z===0)setAnim(myHolder,'windup');
      if(charge>=100&&frame%3===0){const sc=skillOf(myHolder);
        flame(myHolder.x-myHolder.face*14,myHolder.y-58,sc?[sc.col,sc.col2]:null);}
    }else if(me&&!zPrev&&me.catchCd<=0&&me.z===0&&!LOCKED.includes(me.anim)){me.catchT=18;me.catchCd=26;setAnim(me,'catch',18);}
  }else if(zPrev&&charging&&myHolder){
    throwBall(myHolder,charge>=100&&myHolder.role==='in');charge=0;charging=false;
  }else{charging=false;if(!myHolder)charge=0;}
  if(xNow&&!xPrev&&myHolder){passBall(myHolder);charge=0;charging=false;}
  zPrev=zNow;xPrev=xNow;

  // ---- shared physics ----
  P.forEach(c=>{
    if(c.gone)return;
    if(c.catchT>0)c.catchT--;if(c.catchCd>0)c.catchCd--;
    if(c.lock>0){c.lock--;if(c.lock===0&&LOCKED.includes(c.anim)&&c.anim!=='ko'&&c.anim!=='launch'&&c.anim!=='down')c.anim='idle';}
    if(c.anim==='ko'){c.koT--;c.x+=c.kx;c.kx*=.9;
      if(c.koT<=0)c.gone=true;
      return;}
    if(c.anim==='launch'){ // 강타 피격: 회전하며 포물선 → 바운드 → 다운
      c.x+=c.kvx;c.z+=c.vz;c.vz-=.5;c.kvx*=.985;
      if(frame%3===0)parts.push({x:c.x+rnd(-6,6),y:c.y-c.z+rnd(-20,0),vx:0,vy:0,t:10,col:'#fff',sz:2,grav:0});
      if(c.z<=0&&c.vz<0){
        if(!c.bounced){c.bounced=true;c.z=0;c.vz=3;c.kvx*=.7;shake=Math.max(shake,4);
          burst(c.x,c.y+2,'#b7a289',8,2.5);sfx(150,.12,'sawtooth',.1,-40);}
        else{c.z=0;c.vz=0;c.anim='down';c.downT=c.hp<=0?22:30;
          burst(c.x,c.y+2,'#b7a289',10,3);sfx(110,.18,'sawtooth',.12,-50);}
      }
      const bl=bounds(c);c.x=clamp(c.x,bl.x0-26,bl.x1+26);
      return;}
    if(c.anim==='down'){c.downT--;
      if(c.downT<=0){if(c.hp<=0){c.anim='ko';c.koT=60;}else c.anim='idle';}
      return;}
    if(c.anim==='hit'){c.x+=c.kx;c.kx*=.88;const b=bounds(c);c.x=clamp(c.x,b.x0-10,b.x1+10);}
    if(c.z>0||c.vz>0){c.z+=c.vz;c.vz-=.46;
      if(c.z<=0){c.z=0;c.vz=0;
        if(c.anim==='jump'){c.anim='idle';c.landT=6;
          burst(c.x,c.y+2,'#b7a289',7,2,.02);sfx(180,.07,'square',.05,-60);}}}
    if(c.landT>0)c.landT--;
    if(c.anim==='cheer'&&c.z===0&&frame%22===0)c.vz=4.5;
    if(c.moving&&c.z===0&&(frame+c.i)%6===0)
      parts.push({x:c.x+rnd(-5,5),y:c.y+3,vx:rnd(-.3,.3),vy:rnd(-.6,-.2),t:11,col:'#b7a289',sz:2,grav:-.01});
  });

  // ---- CPU AI ----
  const lvl=cpuLevel;
  P.filter(c=>c.team===1&&!c.gone&&c.hp>0).forEach(c=>{
    if(ball.holder===c)c.holdT=(c.holdT||0)+1;else c.holdT=0;
    if(c.holdT>240){ // 워치독: 상태가 어떻게 꼬여도 4초 이상 들고 있으면 강제 투척
      c.fireT=0;c.lock=0;c.anim='idle';throwBall(c,false);c.aiT=rnd(.6,1.2);c.holdT=0;return;}
    if(LOCKED.includes(c.anim)&&c.anim!=='windup')return;
    c.aiT-=1/60;
    const h=homePos(c),b=bounds(c);
    const before={x:c.x,y:c.y};
    if(ball.holder===c){
      c.y+=Math.sin(frame/18+c.i*2)*1.3;
      c.x+=(h.x-c.x)*.03;
      if(c.aiT<=0&&!c.fireT){
        const canFire=c.role==='in'&&!!skillOf(c);
        const roll=Math.random();
        if(canFire&&roll<.16+.08*lvl){setAnim(c,'windup');c.fireT=40;c.aiT=2;}
        else if(roll<.22&&c.role==='in'){passBall(c);c.aiT=rnd(.7,1.3);}
        else{throwBall(c,false);c.aiT=rnd(.5,1.2-lvl*.12);}
      }
      if(c.fireT>0){c.fireT--;const sc=skillOf(c);flame(c.x-c.face*14,c.y-58,sc?[sc.col,sc.col2]:null);}
    }else if(!ball.holder&&!ball.flying){
      if(ball.x>b.x0-60&&ball.x<b.x1+60){
        const d=Math.max(1,dist(ball,c));
        c.x+=(ball.x-c.x)/d*(2.3+lvl*.25);c.y+=(ball.y-c.y)/d*(2.3+lvl*.25);
      }else{c.x+=(h.x-c.x)*.03;c.y+=(h.y-c.y)*.03;}
    }else{
      wander(c,lvl,!!(ball.holder&&ball.holder.team===1));
      separate(c);
      if(ball.flying&&ball.fromTeam===0&&ball.dmg>0){
        const heading=(ball.vx*(c.x-ball.x)+ball.vy*(c.y-ball.y))>0;
        const d=dist(ball,c);
        if(heading&&d<230&&Math.random()<(.018+.014*lvl)){
          const r=Math.random();
          if(r<.34)tryJump(c);
          else if(r<.72&&c.catchCd<=0&&!ball.fire){c.catchT=18;c.catchCd=30;setAnim(c,'catch',18);}
          else{c.y+=(c.y>CT.y+CT.h/2?-1:1)*26;}
        }
        if(heading&&d<150)c.y+=(ball.y>=c.y?-1:1)*2.4;
      }
    }
    c.x=clamp(c.x,b.x0,b.x1);c.y=clamp(c.y,b.y0,b.y1);
    c.moving=dist(before,c)>0.6;
  });

  // fire release for CPU (after windup finishes)
  P.filter(c=>c.team===1&&c.fireT===0&&c.anim==='windup'&&ball.holder===c).forEach(c=>{
    throwBall(c,true);c.aiT=rnd(1.2,2);
  });

  // 아군 비조작 내야수 자동 무빙 (망부석 방지)
  P.filter(c=>c.team===0&&c.role==='in'&&c.hp>0&&!c.gone&&c!==me&&c!==ball.holder).forEach(c=>{
    if(LOCKED.includes(c.anim))return;
    const before={x:c.x,y:c.y};
    if(!ball.holder&&!ball.flying&&ball.x<CT.cx&&dist(ball,c)<180){
      const d=Math.max(1,dist(ball,c));c.x+=(ball.x-c.x)/d*2.2;c.y+=(ball.y-c.y)/d*2.2;
    }else{
      wander(c,1,!!(ball.holder&&ball.holder.team===0));
      if(ball.flying&&ball.fromTeam===1&&ball.dmg>0){
        const heading=(ball.vx*(c.x-ball.x)+ball.vy*(c.y-ball.y))>0;
        if(heading&&dist(ball,c)<150)c.y+=(ball.y>=c.y?-1:1)*2.6;
      }
    }
    separate(c);
    const b=bounds(c);c.x=clamp(c.x,b.x0,b.x1);c.y=clamp(c.y,b.y0,b.y1);
    c.moving=dist(before,c)>0.6;
  });

  // player outfielders auto-drift
  P.filter(c=>c.team===0&&c.role==='out'&&c!==ball.holder).forEach(c=>{
    const b=bounds(c),h=homePos(c);
    if(!ball.holder&&!ball.flying&&ball.x>b.x0-60){
      const d=Math.max(1,dist(ball,c));c.y+=(ball.y-c.y)/d*2.4;c.moving=true;
    }else{c.y+=(h.y-c.y)*.03;c.moving=false;}
    c.y=clamp(c.y,b.y0,b.y1);
  });

  // ---- ball ----
  ball.spin+=Math.hypot(ball.vx,ball.vy)*.05+.02;
  if(ball.holder){
    const c=ball.holder;
    if(c.anim==='windup'){ball.x=c.x-c.face*15;ball.y=c.y;ball.z=64+c.z;}
    else if(c.anim==='throw'){ball.x=c.x+c.face*22;ball.y=c.y;ball.z=44+c.z;}
    else{ball.x=c.x+c.face*13;ball.y=c.y;ball.z=34+c.z;}
  }else{
    ball.x+=ball.vx;ball.y+=ball.vy;
    if(ball.flying&&ball.skill){ball.skT++;const s=ball.skill;
      if(s.type==='curve'){const a=Math.sin(ball.skT*.22)*.14;
        const nvx=ball.vx*Math.cos(a)-ball.vy*Math.sin(a);
        const nvy=ball.vx*Math.sin(a)+ball.vy*Math.cos(a);
        ball.vx=nvx;ball.vy=nvy;}
      else if(s.type==='zigzag'&&ball.skT%8===0){
        const spd=Math.hypot(ball.vx,ball.vy);
        const dir=Math.atan2(ball.vy,ball.vx)+(((ball.skT>>3)%2)?.55:-.55);
        ball.vx=Math.cos(dir)*spd;ball.vy=Math.sin(dir)*spd;}
      else if(s.type==='drop'){
        if(ball.dropPhase===0){ball.z+=ball.vz;
          if(ball.tgt&&ball.tgt.hp>0){const dd=Math.max(1,dist(ball,ball.tgt));
            ball.vx=(ball.tgt.x-ball.x)/dd*10;ball.vy=(ball.tgt.y-ball.y)/dd*10;}
          if(ball.z>130){ball.dropPhase=1;ball.vz=-6.5;}
        }else{ball.z+=ball.vz;ball.vz-=.5;
          if(ball.z<=0){ball.z=0;looseBall();}}
      }
    }
    if(ball.flying&&ball.passTo){ball.z+=ball.vz;ball.vz-=.09;if(ball.z<12)ball.z=12;}
    if(!ball.flying){ // loose: bounce physics
      ball.z+=ball.vz;ball.vz-=.35;
      if(ball.z<=0){ball.z=0;
        if(Math.abs(ball.vz)>.8){ball.vz=-ball.vz*.45;sfx(220,.05,'square',.04);}
        else ball.vz=0;}
    }
    if(ball.flying){
      ball.hist.push({x:ball.x,y:ball.y,z:ball.z});if(ball.hist.length>7)ball.hist.shift();
      if(ball.fire){const sc=ball.skill;const cs=sc?[sc.col,sc.col2]:null;
        flame(ball.x,ball.y-ball.z,cs);flame(ball.x,ball.y-ball.z,cs);}
      if(ball.passTo&&ball.passTo.hp>0&&dist(ball,ball.passTo)<20){
        ball.holder=ball.passTo;ball.passTo=null;ball.flying=false;ball.vz=0;sfx(620,.06,'square',.06);
      }else if(ball.dmg>0&&!(ball.skill&&ball.skill.type==='drop'&&ball.dropPhase===0)){
        const rad=ball.skill&&ball.skill.type==='heavy'?28:21;
        for(const c of P){
          if(c.gone||c.hp<=0||c.team===ball.fromTeam||c.anim==='launch'||c.anim==='down')continue;
          if(dist(ball,c)<rad){
            const dropping=ball.skill&&ball.skill.type==='drop';
            if(!dropping&&c.z>16)continue;
            if(dropping&&ball.z>55)continue;
            if(c.catchT>0){
              if(ball.fire){hitChar(c,true);}
              else{ball.holder=c;ball.flying=false;ball.fire=false;ball.skill=null;ball.dmg=1;ball.hist=[];ball.vz=0;
                setAnim(c,'catch',10);
                flash(c.team===0?'나이스 캐치!!':'상대가 잡았다!');
                sfx(780,.15,'square',.11,170);burst(c.x,c.y-40,'#80d8ff',10,2.5);}
            }else hitChar(c,false);
            break;
          }
        }
      }
      if(ball.x<CT.x-80||ball.x>CT.x+CT.w+80||ball.y<CT.y-30||ball.y>CT.y+CT.h+40){
        ball.vx*=-.6;ball.vy*=-.6;looseBall();
      }
    }else{
      ball.vx*=.93;ball.vy*=.93;
      for(const c of P){if(c.gone||c.hp<=0||c.anim==='ko'||c.anim==='launch'||c.anim==='down')continue;
        if(dist(ball,c)<22&&ball.z<40){ball.holder=c;ball.vz=0;sfx(500,.05,'square',.05);break;}}
      ball.x=clamp(ball.x,CT.x-70,CT.x+CT.w+70);ball.y=clamp(ball.y,CT.y-20,CT.y+CT.h+30);
      // 볼보이: 구석·데드존에 방치된 공을 코트 안으로 되던짐 (경기 흐름 유지)
      const inCourt=ball.x>CT.x&&ball.x<CT.x+CT.w&&ball.y>CT.y&&ball.y<CT.y+CT.h;
      const slow=Math.hypot(ball.vx,ball.vy)<.5&&ball.z<4;
      ball.idleT=slow?(ball.idleT||0)+1:0;
      if(ball.idleT>(inCourt?150:30)){
        const tx=ball.x<CT.cx?CT.x+CT.w*.3:CT.x+CT.w*.7;
        const ty=CT.y+CT.h*(.35+Math.random()*.3);
        const d=Math.max(1,Math.hypot(tx-ball.x,ty-ball.y));
        const sp=Math.min(17,d/13); // 마찰 감쇠 감안해 목표점 근처 착지
        ball.vx=(tx-ball.x)/d*sp;ball.vy=(ty-ball.y)/d*sp;
        ball.vz=5.5;ball.z=Math.max(ball.z,2);ball.idleT=0;
        flash('볼보이!');sfx(900,.09,'square',.06,150);
      }
    }
  }
}

// ================= drawing =================
function poseOf(c){
  if(c.anim==='ko'||c.anim==='down')return 'ko';
  if(c.anim==='hit'||c.anim==='launch')return 'hit';
  if(c.anim==='windup')return 'windup';
  if(c.anim==='throw')return 'throw0';
  if(c.anim==='catch')return 'catch0';
  if(c.anim==='cheer')return 'cheer';
  if(c.z>0)return 'jump';
  if(c.anim==='run'&&c.moving)return ['run0','idle','run1','idle'][(frame>>3)%4];
  return 'idle';
}
function drawFighter(c){
  if(c.gone)return;
  const blink=c.anim==='hit'&&(frame>>2)%2===0;
  const scl=(CHARDECO[c.name]&&CHARDECO[c.name].scale)||1;
  const shs=clamp(1-c.z/160,.45,1); // 높이 오를수록 그림자 축소
  g.fillStyle='rgba(0,0,0,.35)';g.beginPath();g.ellipse(c.x,c.y+4,14*scl*shs,4.5*scl*shs,0,0,7);g.fill();
  if(blink){nameTag(c);return;}
  const pose=poseOf(c);
  const spr=sprite(pose,palOf(c),c.name);
  const SC=3;
  const dw=spr.width*SC*scl,dh=spr.height*SC*scl;
  const by=c.y-c.z;
  const bob=(pose==='idle'&&(frame>>4)%2)?SC:0;
  let ssx=1,ssy=1; // 스쿼시&스트레치
  if(c.landT>0){ssy=.8+(6-c.landT)*.033;ssx=2-ssy;}
  else if(c.z>0&&c.anim!=='launch'){ssy=1+clamp(c.vz*.025,-.1,.14);ssx=2-ssy;}
  g.save();
  if(c.face<0){g.translate(c.x,0);g.scale(-1,1);g.translate(-c.x,0);}
  if(c.anim==='launch'){ // 회전 텀블 + 잔상
    g.globalAlpha=.16;g.drawImage(spr,c.x-c.kvx*3-dw/2,by-dh+6,dw,dh);
    g.globalAlpha=.09;g.drawImage(spr,c.x-c.kvx*6-dw/2,by-dh+6,dw,dh);
    g.globalAlpha=1;
    g.translate(c.x,by-dh/2);g.rotate((c.kvx>0?1:-1)*frame*.3);
    g.drawImage(spr,-dw/2,-dh/2,dw,dh);
  }else{
    g.drawImage(spr,c.x-dw*ssx/2,by-dh*ssy+6+bob,dw*ssx,dh*ssy);
  }
  g.restore();
  if(ball.holder===c&&charging&&charge>=100){
    g.strokeStyle=`rgba(255,${120+Math.floor(rnd(0,100))},0,.8)`;g.lineWidth=2;
    g.strokeRect(c.x-dw/2-3,by-dh,dw+6,dh+4);
  }
  if(c.catchT>0){g.strokeStyle='#ffe36e';g.lineWidth=2;g.beginPath();g.arc(c.x+c.face*12,by-32,16,0,7);g.stroke();}
  nameTag(c);
}
function nameTag(c){
  g.fillStyle='rgba(255,255,255,.7)';g.font='9px monospace';g.textAlign='center';
  g.fillText(c.name,c.x,c.y+18);
}
function drawBall(){
  const y=ball.y-ball.z;
  const sc=ball.skill;
  const main=sc?sc.col:(ball.fire?'#ff5722':'#f4f4f4');
  const acc=sc?sc.col2:(ball.fire?'#ffd54f':'#c62828');
  const R=sc&&sc.type==='heavy'?13:(ball.fire?10:7.5);
  ball.hist.forEach((h,i)=>{g.globalAlpha=(i+1)/ball.hist.length*.4;
    g.fillStyle=ball.fire?main:'#ffffff';
    g.beginPath();g.arc(h.x,h.y-h.z,ball.fire?R-1:6,0,7);g.fill();});
  g.globalAlpha=1;
  const shR=clamp(7+ball.z*.06,7,16); // 높이 들수록 그림자 커짐 (급강하슛 경고)
  g.fillStyle='rgba(0,0,0,.3)';g.beginPath();g.ellipse(ball.x,ball.y+3,shR,shR*.42,0,0,7);g.fill();
  g.fillStyle=main;g.beginPath();g.arc(ball.x,y,R,0,7);g.fill();
  g.strokeStyle=acc;g.lineWidth=2;
  g.beginPath();g.arc(ball.x,y,R,ball.spin,ball.spin+1.9);g.stroke();
  if(ball.fire){g.fillStyle=acc;g.beginPath();g.arc(ball.x-3,y-3,3.5,0,7);g.fill();}
}
function heart(x,y,on){
  const c=on?'#ff3b4b':'#3a3245';
  px(x,y,2,2,c);px(x+3,y,2,2,c);px(x,y+2,5,2,c);px(x+1,y+4,3,1,c);px(x+2,y+5,1,1,c);
}
function roster(team,x0){
  const list=P.filter(p=>p.team===team&&p.role==='in');
  list.forEach((c,i)=>{
    const x=x0+i*105*(team===0?1:-1)-(team===1?95:0);
    g.globalAlpha=c.hp>0?1:.35;
    px(x-2,12,32,36,'#f2f2f2');px(x,14,28,32,'#101024');   // NES식 흰 테두리 패널
    const head=sprite('idle',palOf(c),c.name);
    g.drawImage(head,1,0,14,10,x+4,15,20,15);
    for(let h=0;h<c.maxHp;h++)heart(x+Math.round((28-c.maxHp*6)/2)+h*6,33,h<c.hp);
    if(c.hp===1&&(frame>>4)%2)px(x,14,28,32,'rgba(255,60,60,.28)');
    g.fillStyle='#ffd54f';g.font='9px monospace';g.textAlign='center';g.fillText(c.name,x+14,58);
    g.globalAlpha=1;
  });
}
function overlay(a=.78){g.fillStyle=`rgba(8,4,18,${a})`;g.fillRect(-20,-20,W+40,H+40);}
function drawCutIn(){
  const t=Math.max(0,64-cutT); // 0→64
  const slide=clamp(t/8,0,1);
  const sk=cutChar?skillOf(cutChar):null;
  const col=sk?sk.col:'#ff5722',col2=sk?sk.col2:'#ffeb3b';
  const lbl=(sk?sk.label:'필살슛')+' !!';
  overlay(.55);
  g.save();
  g.translate(0,(1-slide)*-260);
  g.fillStyle='#1b0f2e';g.fillRect(0,150,W,220);
  g.fillStyle=col;g.fillRect(0,150,W,8);g.fillRect(0,362,W,8);
  g.strokeStyle='rgba(255,160,60,.5)';g.lineWidth=2;
  for(let i=0;i<26;i++){const ly=160+((i*37+frame*13)%196);
    g.beginPath();g.moveTo(0,ly);g.lineTo(W,ly-30);g.stroke();}
  if(cutChar){
    const spr=sprite('windup',palOf(cutChar),cutChar.name);
    const fx=cutChar.team===0?150:W-390;
    g.save();
    if(cutChar.face<0){g.translate(fx+240,0);g.scale(-1,1);g.translate(-(fx+240),0);}
    g.drawImage(spr,1,1,14,9,fx,168,240,168);
    g.restore();
  }
  const tx=cutChar&&cutChar.team===0?W-330:330;
  g.textAlign='center';
  g.font='bold 54px monospace';
  g.fillStyle='#000';g.fillText(lbl,tx+3,282+3);
  g.fillStyle=(frame>>2)%2?col2:col;g.fillText(lbl,tx,282);
  g.font='bold 16px monospace';g.fillStyle='#ffd54f';
  g.fillText(cutChar?cutChar.name+'의 필살슛!':'',tx,318);
  g.restore();
}
function draw(){
  g.save();
  if(shake>0)g.translate(rnd(-shake,shake),rnd(-shake,shake));
  const grad=g.createLinearGradient(0,0,0,H);grad.addColorStop(0,'#100a20');grad.addColorStop(1,'#2a1a3a');
  g.fillStyle=grad;g.fillRect(-20,-20,W+40,H+40);
  // 관중석: 3단 벤치 + 픽셀 관중 + 파도 응원 + 현수막
  px(0,64,W,112,'#171226');
  for(let t=0;t<3;t++){
    const by=84+t*30;
    px(0,by+17,W,8,'#2c2140');px(0,by+25,W,2,'#3d2f57');
    for(let i=0;i<32;i++){
      const sx=((i*97+t*53)%(W+30))-15+((t%2)*15);
      const r=(i*31+t*17)%97;
      const shirt=['#c62828','#1565c0','#ef6c00','#6a1b9a','#2e7d32','#f9a825'][r%6];
      const skin=r%5===0?'#c98b5e':'#ffd9a8';
      const cheer=((r*7+(frame>>4))%11)<2;
      const oy=cheer?-3:0;
      px(sx,by+oy+6,6,7,shirt);
      px(sx+1,by+oy,4,5,skin);
      px(sx+1,by+oy-1,4,2,['#2d2d2d','#5b4632','#111','#7a5230'][r%4]);
      if(cheer){px(sx-2,by+oy+5,2,4,skin);px(sx+6,by+oy+5,2,4,skin);
        if(r%3===0)px(sx-2,by+oy+2,2,3,r%2?'#ffee58':'#ff5722');}
    }
  }
  px(330,63,300,19,'#7f1d1d');px(332,65,296,15,'#991f1f');
  g.fillStyle='#ffe9c9';g.font='bold 11px monospace';g.textAlign='center';
  g.fillText('제19회 전국 초등부 피구 선수권',480,76);
  px(0,61,W,3,'#0d0a18');px(0,174,W,6,'#0d0a18');
  px(CT.x-6,CT.y-6,CT.w+12,CT.h+12,'#6d4c2e');
  for(let i=0;i<10;i++)px(CT.x,CT.y+i*(CT.h/10),CT.w,CT.h/10-2,i%2?'#c98f4e':'#c2874a');
  px(CT.x,CT.y,CT.w,4,'#fff');px(CT.x,CT.y+CT.h-4,CT.w,4,'#fff');
  px(CT.x,CT.y,4,CT.h,'#fff');px(CT.x+CT.w-4,CT.y,4,CT.h,'#fff');
  px(CT.cx-2,CT.y,4,CT.h,'#fff');
  g.strokeStyle='rgba(255,255,255,.25)';g.lineWidth=3;
  g.beginPath();g.arc(CT.cx,CT.y+CT.h/2,54,0,7);g.stroke();
  px(CT.x-64,CT.y,44,CT.h,'rgba(255,255,255,.06)');px(CT.x+CT.w+20,CT.y,44,CT.h,'rgba(255,255,255,.06)');

  if(ball.fire&&ball.flying&&cutT<=0){g.strokeStyle='rgba(255,180,80,.25)';g.lineWidth=2;
    for(let i=0;i<7;i++){const ly=ball.y-ball.z+rnd(-40,40);
      g.beginPath();g.moveTo(ball.x-ball.vx*8,ly);g.lineTo(ball.x-ball.vx*16-rnd(0,40),ly);g.stroke();}}

  [...P].sort((a,b)=>a.y-b.y).forEach(drawFighter);
  drawBall();
  parts.forEach(p=>{g.globalAlpha=clamp(p.t/20,0,1);g.fillStyle=p.col;g.fillRect(p.x,p.y,p.sz,p.sz);});
  g.globalAlpha=1;

  const me=(state==='play'&&fightT<=0)?myActive():null;
  if(me&&!me.gone){g.fillStyle='#ffe36e';const ty=me.y-me.z-84+((frame>>3)%2)*3;
    g.beginPath();g.moveTo(me.x-7,ty);g.lineTo(me.x+7,ty);g.lineTo(me.x,ty+9);g.fill();}

  roster(0,20);roster(1,W-46);
  px(W/2-46,10,92,24,'#f2f2f2');px(W/2-44,12,88,20,'#101024');
  g.textAlign='center';g.fillStyle='#ffd54f';g.font='bold 12px monospace';
  g.fillText('ROUND '+cpuLevel,W/2,26);
  g.font='10px monospace';
  g.fillStyle='#6fb2ff';g.textAlign='right';g.fillText('파랑초등부',W/2-54,25);
  g.fillStyle='#ff7b7b';g.textAlign='left';g.fillText('붉은초등부',W/2+54,25);
  g.textAlign='center';
  if(charging||charge>0){
    px(W/2-105,38,210,20,'#f2f2f2');px(W/2-103,40,206,16,'#101024');
    const segs=Math.floor(charge/8.34);
    for(let i=0;i<12;i++)if(i<segs)
      px(W/2-100+i*17,43,14,10,charge>=100?'#ff5722':(i>=8?'#ff9800':'#ffd54f'));
    const hl=ball.holder&&ball.holder.team===0;
    if(hl&&ball.holder.role!=='in'){g.fillStyle='#8878b8';g.font='9px monospace';g.fillText('(필살슛은 내야 선수만!)',W/2,70);}
    if(charge>=100&&(frame>>2)%2===0){const sc=(ball.holder&&ball.holder.team===0)?skillOf(ball.holder):null;
      g.fillStyle=sc?sc.col:'#ff5722';g.font='bold 13px monospace';
      g.fillText('★ '+(sc?sc.label.replace(/ /g,''):'필살슛')+' 준비완료! ★',W/2,72);}
  }
  if(cutT>0)drawCutIn();
  if(msgT>0&&cutT<=0){g.textAlign='center';g.font=`bold ${msgBig?34:24}px monospace`;
    const yy=H/2-70;
    g.fillStyle='#000';g.fillText(msg,W/2+2,yy+2);
    g.fillStyle=msgBig?'#ff5722':'#ffb347';g.fillText(msg,W/2,yy);}

  if(state==='title'){
    overlay(.92);g.textAlign='center';
    const t=frame/30;
    for(let i=0;i<44;i++){const sx=(i*173)%W,sy=8+(i*97)%290;
      if(((i+(frame>>5))%9)<8)px(sx,sy,2,2,i%3?'#3d3357':'#8878b8');}
    const heroL=sprite('windup',{H:'#ff7f27',B:'#fff',S:'#ffd9a8',U:'#2f6fde',D:'#1c4aa0'},'불꽃');
    const heroR=sprite('idle',{H:'#cfd8dc',B:'#fff',S:'#f0c894',U:'#e04141',D:'#8f1f1f'},'강철');
    g.drawImage(heroL,140,300+Math.sin(t)*6,16*7,22*7);
    g.save();g.translate(820,0);g.scale(-1,1);g.translate(-820,0);
    g.drawImage(heroR,700,310+Math.cos(t)*6,16*7,22*7);g.restore();
    g.font='bold 50px monospace';
    g.fillStyle='#5c1010';g.fillText('불꽃의 피구왕',W/2+6,206);
    g.fillStyle='#c62828';g.fillText('불꽃의 피구왕',W/2+3,203);
    g.fillStyle='#ffb347';g.fillText('불꽃의 피구왕',W/2,200);
    px(W/2-64,216,128,24,'#7f1d1d');px(W/2-62,218,124,20,'#101024');
    g.fillStyle='#ffd54f';g.font='bold 15px monospace';g.fillText('D X 버 전',W/2,232);
    g.fillStyle='#ffe9c9';g.font='14px monospace';
    g.fillText('상대 내야 4명을 모두 아웃시켜라!',W/2,300);
    if((frame>>4)%2===0){g.fillStyle='#fff';g.font='bold 19px monospace';g.fillText('▶ GAME START',W/2,382);}
    g.fillStyle='#59506e';g.font='11px monospace';g.fillText('PUSH ENTER KEY',W/2,406);
    g.fillStyle='#4a4160';g.font='10px monospace';
    g.fillText('© 2026 FIRE DODGE CLUB · 원작 메커니즘 오마주 · 오리지널 아트 팬게임',W/2,556);
  }
  if(state==='intro'){
    overlay(.6);g.textAlign='center';
    const s=clamp(introT/22,0,1);
    g.font='bold 30px monospace';
    g.fillStyle='#6fb2ff';g.fillText('파랑 초등부',W/2-260+(1-s)*-300,250);
    g.fillStyle='#ff7b7b';g.fillText('붉은 초등부',W/2+260+(1-s)*300,250);
    g.fillStyle='#fff';g.font='bold 44px monospace';
    if(introT>30)g.fillText('VS',W/2,262);
    g.fillStyle='#ffd54f';g.font='13px monospace';
    if(introT>60)g.fillText(`상대 레벨 ${cpuLevel} — 주장 '강철'의 강속구를 조심하라!`,W/2,320);
  }
  if(state==='play'&&fightT>0){
    g.textAlign='center';g.font='bold 42px monospace';
    if(fightT>40){g.fillStyle='#6b5300';g.fillText('READY...',W/2+3,H/2-17);
      g.fillStyle='#ffd54f';g.fillText('READY...',W/2,H/2-20);}
    else{g.fillStyle='#5c1010';g.fillText('FIGHT!!',W/2+3,H/2-17);
      g.fillStyle='#ff5722';g.fillText('FIGHT!!',W/2,H/2-20);}
  }
  if(state==='play'&&paused){overlay(.55);g.textAlign='center';
    g.fillStyle='#fff';g.font='bold 30px monospace';g.fillText('PAUSE',W/2,H/2);}
  if(state==='over'){
    overlay();g.textAlign='center';g.font='bold 46px monospace';
    g.fillStyle=winner===0?'#7CFC00':'#ff5252';
    g.fillText(winner===0?'승리!!':'패배...',W/2,240);
    g.fillStyle='#ffe9c9';g.font='15px monospace';
    g.fillText(winner===0?(cpuLevel<3?`다음 상대는 더 강하다! (LV.${cpuLevel})`:'최강 레벨 클리어! 진정한 피구왕!'):'포기하지 마! 불꽃은 꺼지지 않는다!',W/2,290);
    if((frame>>4)%2===0){g.fillStyle='#fff';g.font='bold 20px monospace';g.fillText('- PRESS ENTER -',W/2,350);}
  }
  if(flashT>0){g.fillStyle=`rgba(255,240,200,${flashT/14})`;g.fillRect(-20,-20,W+40,H+40);}
  g.restore();
  g.drawImage(crt,0,0);
}

setInterval(()=>{P.forEach(c=>{
  if(c.gone||LOCKED.includes(c.anim)||c.anim==='ko'||c.anim==='cheer'||c.z>0)return;
  c.anim=c.moving?'run':'idle';
});},50);

reset();
(function loop(){update();draw();requestAnimationFrame(loop);})();
</script>
